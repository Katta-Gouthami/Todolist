<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>TaskFlow | To-Do App</title>

</head>
<body>

<div class="app-container">
    <h1>
        <span>✅</span> TaskFlow
    </h1>
    <div class="subtitle">Manage your daily tasks — they won't disappear</div>

    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Write a new task..." autocomplete="off">
        <button id="addBtn">+ Add</button>
    </div>

    <div class="stats">
        <span>📋 Your tasks</span>
        <span><span id="taskCount">0</span> total</span>
    </div>

    <ul class="task-list" id="taskList">
        <div class="empty-state">
            <i>📭</i>
            <p>No tasks yet. Add one above!</p>
        </div>
    </ul>

    <a href="javascript:history.back()" class="back-link">← Back to Portfolio</a>
</div>

<script>
    // Load tasks from localStorage
    let tasks = JSON.parse(localStorage.getItem('taskflow_tasks')) || [];

    function saveTasks() {
        localStorage.setItem('taskflow_tasks', JSON.stringify(tasks));
    }

    function updateTaskCount() {
        document.getElementById('taskCount').textContent = tasks.length;
    }

    function renderTasks() {
        const taskList = document.getElementById('taskList');
        
        if (tasks.length === 0) {
            taskList.innerHTML = `
                <div class="empty-state">
                    <i>📭</i>
                    <p>No tasks yet. Add one above!</p>
                </div>
            `;
            updateTaskCount();
            return;
        }

        taskList.innerHTML = '';
        tasks.forEach((task, index) => {
            const li = document.createElement('li');
            li.className = 'task-item';
            
            li.innerHTML = `
                <div class="task-left">
                    <input type="checkbox" class="task-checkbox" data-index="${index}" ${task.completed ? 'checked' : ''}>
                    <span class="task-text ${task.completed ? 'completed' : ''}">${escapeHtml(task.text)}</span>
                </div>
                <button class="delete-btn" data-index="${index}">
                    <i class="fas fa-trash"></i> ✖
                </button>
            `;
            
            taskList.appendChild(li);
        });

        // Add event listeners to checkboxes
        document.querySelectorAll('.task-checkbox').forEach(checkbox => {
            checkbox.addEventListener('change', (e) => {
                const index = parseInt(e.target.dataset.index);
                tasks[index].completed = e.target.checked;
                saveTasks();
                renderTasks();
            });
        });

        // Add event listeners to delete buttons
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const index = parseInt(btn.dataset.index);
                tasks.splice(index, 1);
                saveTasks();
                renderTasks();
            });
        });

        updateTaskCount();
    }

    // Simple XSS protection
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function addTask() {
        const input = document.getElementById('taskInput');
        const text = input.value.trim();
        
        if (text === '') {
            alert('Please write something first!');
            return;
        }
        
        tasks.push({
            text: text,
            completed: false,
            createdAt: new Date().toISOString()
        });
        
        saveTasks();
        renderTasks();
        input.value = '';
        input.focus();
    }

    // Add task on button click
    document.getElementById('addBtn').addEventListener('click', addTask);

    // Add task on Enter key
    document.getElementById('taskInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTask();
    });

    // Initial render
    renderTasks();
</script>

</body>
</html>
